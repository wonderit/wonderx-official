<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>페이지를 찾을 수 없습니다 - WonderX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Space Grotesk', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .error-code {
            font-size: clamp(5rem, 15vw, 10rem);
            font-weight: 700;
            color: #7d8187;
            line-height: 1;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            font-weight: 600;
            margin-bottom: 1rem;
        }

        p {
            color: #7d8187;
            font-size: 1rem;
            margin-bottom: 2rem;
            max-width: 400px;
            line-height: 1.6;
        }

        a {
            display: inline-block;
            color: #ffffff;
            text-decoration: none;
            border: 1px solid #1f2228;
            padding: 0.8rem 2rem;
            font-size: 0.95rem;
            transition: border-color 0.3s ease;
        }

        a:hover {
            border-color: #7d8187;
        }
    </style>
</head>
<body>
    <div class="error-code">404</div>
    <h1>페이지를 찾을 수 없습니다</h1>
    <p>요청하신 페이지가 존재하지 않거나 이동되었을 수 있습니다.</p>
    <a href="/">홈으로 돌아가기</a>
</body>
</html>
